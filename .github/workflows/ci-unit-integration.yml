name: CI Unit Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          cache: true

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Run unit tests
        run: ctest --test-dir build -C Debug -L unit --output-on-failure

      - name: Run integration tests
        run: ctest --test-dir build -C Debug -L integration --output-on-failure
